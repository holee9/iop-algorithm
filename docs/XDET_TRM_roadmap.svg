<svg xmlns="http://www.w3.org/2000/svg" width="680" height="480" viewBox="0 0 680 480" role="img" font-family="Malgun Gothic, Apple SD Gothic Neo, sans-serif">
<title>X-ray FPD TRM roadmap</title>
